<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>who are you?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="scanlines"></div>

  <main id="screen">
    <section id="intro">
      <p class="tiny">SYSTEM RECOVERY // UNKNOWN USER DETECTED</p>
      <h1>who are you?</h1>

      <input id="nameInput" type="text" autocomplete="off" placeholder="type anything..." />
      <button id="enterBtn">enter</button>

      <p id="response"></p>
    </section>

    <section id="world" class="hidden">
      <div class="window">
        <p class="bar">memory_archive.exe</p>
        <h2 id="welcomeText"></h2>
        <p id="message"></p>
      </div>

      <div class="grid">
        <a href="#" class="card" data-page="memory">MEMORY</a>
        <a href="#" class="card" data-page="recovery">RECOVERY PRODUCTS</a>
        <a href="#" class="card" data-page="pool">POOLROOMS</a>
        <a href="#" class="card" data-page="observer">OBSERVER</a>
      </div>

      <div id="content" class="window large">
        <p class="bar">open something.</p>
        <p>this place is safe. strange, but safe.</p>
      </div>
    </section>
  </main>

  <audio id="hum" loop>
    <source src="" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
