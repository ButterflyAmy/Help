<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>who are you?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="scanlines"></div>
  <div id="cursorGlow"></div>

  <main id="screen">
    <section id="intro">
      <p class="tiny">SYSTEM RECOVERY // UNKNOWN USER DETECTED</p>
      <h1>who are you?</h1>

      <input id="nameInput" type="text" autocomplete="off" placeholder="type anything..." />
      <button id="enterBtn">enter</button>

      <p id="response"></p>
    </section>

    <section id="world" class="hidden">
      <div class="window">
        <p class="bar">emotional_escape_system.exe</p>
        <h2 id="welcomeText"></h2>
        <p id="message"></p>
      </div>

      <h2 class="question">what hurts today?</h2>

      <div class="grid">
        <button class="card parents" data-room="parents">Did your parents fight again?</button>
        <button class="card study" data-room="study">Are you unmotivated to study?</button>
        <button class="card worthless" data-room="worthless">Do you feel worthless?</button>
        <button class="card unreal" data-room="unreal">Do you feel unreal?</button>
        <button class="card missing" data-room="missing">Do you miss someone?</button>
        <button class="card tired" data-room="tired">Are you just tired of everything?</button>
      </div>

      <div class="controls">
        <button id="soundBtn">turn sound on</button>
      </div>
    </section>

    <section id="roomPage" class="hidden">
      <button id="backBtn">← return to archive</button>

      <div class="roomCenter">
        <p id="roomCode"></p>
        <h1 id="roomTitle"></h1>
        <p id="roomMainText"></p>

        <button id="hiddenBtn">open hidden message</button>
        <p id="hiddenText"></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
